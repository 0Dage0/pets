<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛毛家 · 宠物领养平台</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
</head>
<body>
    <div id="app">
        <!-- Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">毛毛家</h1>
                <p class="logo-sub">宠物领养平台</p>
            </div>

            <!-- Search Bar -->
            <div class="sidebar-search">
                <div class="search-input-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="搜索宠物名称、品种..." id="searchInput">
                </div>
            </div>

            <!-- Navigation -->
            <nav class="sidebar-nav" id="sidebarNav">
                <div class="nav-item active" data-page="home">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">首页</span>
                </div>
                <div class="nav-item" data-page="explore">
                    <span class="nav-icon">🔍</span>
                    <span class="nav-label">探索</span>
                </div>
                <div class="nav-item" data-page="publish">
                    <span class="nav-icon nav-icon-plus">+</span>
                    <span class="nav-label">发布</span>
                </div>
                <div class="nav-item" data-page="chat">
                    <span class="nav-icon">💬</span>
                    <span class="nav-label">消息</span>
                    <span class="badge" id="chatBadge" style="display: none;">0</span>
                </div>
                <div class="nav-item" data-page="profile">
                    <span class="nav-icon">👤</span>
                    <span class="nav-label">我的</span>
                </div>
            </nav>

            <!-- User Section -->
            <div class="sidebar-user" id="sidebarUser">
                <button class="icon-btn" id="notificationBtn">
                    <span class="icon">🔔</span>
                    <span class="badge" id="notificationBadge" style="display: none;">0</span>
                </button>
                <div class="avatar" id="headerAvatar">
                    <img src="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><circle cx=%2220%22 cy=%2220%22 r=%2220%22 fill=%22%23EAE8E4%22/><text x=%2220%22 y=%2225%22 text-anchor=%22middle%22 font-size=%2216%22>👤</text></svg>" alt="头像">
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main" id="main">
            <!-- Pages will be rendered here -->
        </main>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-overlay"></div>
        <div class="modal-content auth-modal">
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">登录</div>
                <div class="auth-tab" data-tab="register">注册</div>
            </div>
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <input type="tel" class="form-input" placeholder="手机号" id="loginPhone" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" placeholder="密码" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            <form class="auth-form" id="registerForm" style="display: none;">
                <div class="form-group">
                    <input type="text" class="form-input" placeholder="昵称" id="registerNickname" required>
                </div>
                <div class="form-group">
                    <input type="tel" class="form-input" placeholder="手机号" id="registerPhone" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" placeholder="密码（至少6位）" id="registerPassword" required>
                </div>
                <div class="form-group">
                    <input type="text" class="form-input" placeholder="城市" id="registerCity" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>
            <button class="btn-close" id="closeAuthModal">×</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/pages/home.js"></script>
    <script src="js/pages/detail.js"></script>
    <script src="js/pages/publish.js"></script>
    <script src="js/pages/adopt.js"></script>
    <script src="js/pages/chat.js"></script>
    <script src="js/pages/profile.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
