server:
  port: ${PORT:8080}

spring:
  application:
    name: pet-adoption

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pet_adoption?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 20

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:maomao-pet-adoption-secret-key-2024-very-long-secret}
  expiration: 86400000

# CORS Configuration
cors:
  allowed-origins: ${CORS_ORIGINS:*}

logging:
  level:
    com.maomao: info
    org.springframework.security: info

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
