version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/pet_adoption?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - JWT_SECRET=maomao-pet-adoption-secret-key-2024-very-long-secret
      - CORS_ORIGINS=*
    depends_on:
      - db
    networks:
      - pet-network

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=pet_adoption
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pet-network

volumes:
  mysql_data:

networks:
  pet-network:
    driver: bridge
